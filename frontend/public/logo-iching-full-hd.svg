<?xml version="1.0" encoding="UTF-8"?>
<svg width="2000" height="500" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7DC6F" />
      <stop offset="50%" stop-color="#E8D5B7" />
      <stop offset="100%" stop-color="#D4AC0D" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- LOGO ICON -->
  <g transform="translate(10, 5)">
    <!-- Cerchio esterno -->
    <circle 
      cx="45" cy="45" r="40" 
      fill="none" 
      stroke="url(#logoGoldGradient)" 
      stroke-width="2"
      filter="url(#logoGlow)"
    />
    
    <!-- Trigrammi decorativi -->
    <g transform="rotate(0 45 45)">
      <rect x="42" y="8" width="6" height="2" fill="#C44D38" rx="1" />
      <rect x="42" y="12" width="6" height="2" fill="#C44D38" rx="1" />
    </g>
    <g transform="rotate(90 45 45)">
      <rect x="42" y="8" width="6" height="2" fill="#C44D38" rx="1" />
      <rect x="42" y="12" width="6" height="2" fill="#C44D38" rx="1" />
    </g>
    <g transform="rotate(180 45 45)">
      <rect x="42" y="8" width="6" height="2" fill="#C44D38" rx="1" />
      <rect x="42" y="12" width="6" height="2" fill="#C44D38" rx="1" />
    </g>
    <g transform="rotate(270 45 45)">
      <rect x="42" y="8" width="6" height="2" fill="#C44D38" rx="1" />
      <rect x="42" y="12" width="6" height="2" fill="#C44D38" rx="1" />
    </g>
    
    <!-- Yin-Yang centrale -->
    <g transform="translate(-5, 0)">
      <!-- Metà bianca -->
      <path 
        d="M50,15 A30,30 0 0,1 50,75 A15,15 0 0,1 50,45 A15,15 0 0,0 50,15" 
        fill="#F5F5F5" 
      />
      <!-- Metà scura -->
      <path 
        d="M50,15 A30,30 0 0,0 50,75 A15,15 0 0,0 50,45 A15,15 0 0,1 50,15" 
        fill="#2C2C2C" 
      />
      <!-- Punto bianco nel nero -->
      <circle cx="50" cy="60" r="5" fill="#F5F5F5" />
      <!-- Punto nero nel bianco -->
      <circle cx="50" cy="30" r="5" fill="#2C2C2C" />
    </g>
    
    <!-- Esagramma stilizzato -->
    <g opacity="0.9" transform="translate(-5, 0)">
      <line x1="42" y1="36" x2="58" y2="36" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
      <line x1="42" y1="42" x2="48" y2="42" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
      <line x1="52" y1="42" x2="58" y2="42" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
      <line x1="42" y1="48" x2="58" y2="48" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
      <line x1="42" y1="54" x2="48" y2="54" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
      <line x1="52" y1="54" x2="58" y2="54" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>
  
  <!-- TESTO -->
  <text x="110" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#2C2C2C">
    I Ching <tspan fill="#C44D38">del Benessere</tspan>
  </text>
  
  <!-- Sottotitolo opzionale -->
  <text x="110" y="78" font-family="Arial, sans-serif" font-size="10" fill="#595959">
    ☯ Saggezza Antica per il Benessere Moderno ☯
  </text>
</svg>
