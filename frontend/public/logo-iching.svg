<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="1000" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7DC6F" />
      <stop offset="50%" stop-color="#E8D5B7" />
      <stop offset="100%" stop-color="#D4AC0D" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGradient)"/>
  
  <!-- Outer golden circle -->
  <circle 
    cx="50" cy="50" r="45" 
    fill="none" 
    stroke="url(#logoGoldGradient)" 
    stroke-width="2"
    filter="url(#logoGlow)"
  />
  
  <!-- Trigrams decorativi -->
  <g transform="rotate(0 50 50)">
    <rect x="47" y="8" width="6" height="2" fill="#C44D38" rx="1" />
    <rect x="47" y="12" width="6" height="2" fill="#C44D38" rx="1" />
  </g>
  <g transform="rotate(90 50 50)">
    <rect x="47" y="8" width="6" height="2" fill="#C44D38" rx="1" />
    <rect x="47" y="12" width="6" height="2" fill="#C44D38" rx="1" />
  </g>
  <g transform="rotate(180 50 50)">
    <rect x="47" y="8" width="6" height="2" fill="#C44D38" rx="1" />
    <rect x="47" y="12" width="6" height="2" fill="#C44D38" rx="1" />
  </g>
  <g transform="rotate(270 50 50)">
    <rect x="47" y="8" width="6" height="2" fill="#C44D38" rx="1" />
    <rect x="47" y="12" width="6" height="2" fill="#C44D38" rx="1" />
  </g>
  
  <!-- Yin-Yang centrale -->
  <g>
    <!-- Metà bianca -->
    <path 
      d="M50,15 A35,35 0 0,1 50,85 A17.5,17.5 0 0,1 50,50 A17.5,17.5 0 0,0 50,15" 
      fill="#F5F5F5" 
    />
    <!-- Metà scura -->
    <path 
      d="M50,15 A35,35 0 0,0 50,85 A17.5,17.5 0 0,0 50,50 A17.5,17.5 0 0,1 50,15" 
      fill="#2C2C2C" 
    />
    <!-- Punto bianco -->
    <circle cx="50" cy="67.5" r="6" fill="#F5F5F5" />
    <!-- Punto scuro -->
    <circle cx="50" cy="32.5" r="6" fill="#2C2C2C" />
  </g>
  
  <!-- Esagramma stilizzato sovrapposto -->
  <g opacity="0.9">
    <line x1="42" y1="40" x2="58" y2="40" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="46" x2="48" y2="46" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    <line x1="52" y1="46" x2="58" y2="46" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="52" x2="58" y2="52" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="58" x2="48" y2="58" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
    <line x1="52" y1="58" x2="58" y2="58" stroke="#D4AC0D" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
